<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Portfolio Hafidz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Portfolio Saya 🚀</h1>

    <form id="form">
        <input type="hidden" id="editIndex">

        <input type="text" id="nama" placeholder="Nama Project" required>
        <input type="text" id="kategori" placeholder="Kategori" required>
        <input type="file" id="gambar" accept="image/*">
        <input type="text" id="link" placeholder="Link Project">
        <textarea id="deskripsi" placeholder="Deskripsi"></textarea>

        <button type="submit">Simpan</button>
    </form>

    <div id="list" class="grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
